<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Scissors icon -->
  <g transform="translate(10, 15)">
    <!-- Left blade -->
    <ellipse cx="12" cy="12" rx="8" ry="8" stroke="#d3ac39" stroke-width="2" fill="none"/>
    <line x1="18" y1="18" x2="30" y2="30" stroke="#d3ac39" stroke-width="2"/>
    <!-- Right blade -->
    <ellipse cx="28" cy="12" rx="8" ry="8" stroke="#d3ac39" stroke-width="2" fill="none"/>
    <line x1="22" y1="18" x2="10" y2="30" stroke="#d3ac39" stroke-width="2"/>
    <!-- Center screw -->
    <circle cx="20" cy="15" r="2" fill="#d3ac39"/>
  </g>
  <!-- Salon name -->
  <text x="55" y="32" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#d3ac39" letter-spacing="1">ELAINE</text>
  <text x="55" y="52" font-family="Georgia, serif" font-size="12" fill="#ffffff" letter-spacing="2">CABELEIREIRO</text>
  <!-- Decorative line -->
  <line x1="55" y1="36" x2="185" y2="36" stroke="#d3ac39" stroke-width="0.5"/>
</svg>
